name: release

# Tag-driven binary release: one controlled Bun build produces all six desktop
# targets, then artifact fan-in lets native Linux, macOS, and Windows runners
# verify the same staged binaries before the sole publishing job can run.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert tag matches plugin.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(jq -r .version .claude-plugin/plugin.json)"
          if [ "$tag" != "$manifest" ]; then
            echo "tag v$tag does not match plugin.json version $manifest" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Build all targets (build-matrix)
        working-directory: kit/hydra-ts
        run: |
          export HYDRA_BUN="$(command -v bun)"
          node --experimental-strip-types scripts/build-matrix.ts

      - name: Stage release assets
        working-directory: kit/hydra-ts
        run: |
          mkdir -p release-assets
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cp "dist/bun-$t/hydra-cli" "release-assets/hydra-cli-$t"
            cp "dist/bun-$t/manifest.json" "release-assets/manifest-$t.json"
          done
          for t in windows-arm64 windows-x64; do
            cp "dist/bun-$t/hydra-cli.exe" "release-assets/hydra-cli-$t.exe"
            cp "dist/bun-$t/manifest.json" "release-assets/manifest-$t.json"
          done
          cp dist/manifest.json release-assets/manifest-all.json
          (cd release-assets && shasum -a 256 hydra-cli-* > SHA256SUMS)

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: kit/hydra-ts/release-assets
          if-no-files-found: error

  verify-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: kit/hydra-ts/release-assets
      - name: Native Linux black-box and version verification
        working-directory: kit/hydra-ts
        run: |
          chmod +x release-assets/hydra-cli-linux-x64
          node --experimental-strip-types scripts/blackbox-compiled.ts release-assets/hydra-cli-linux-x64
          reported="$(env -u BUN_BE_BUN release-assets/hydra-cli-linux-x64 version --json | jq -r .version)"
          test "v$reported" = "$GITHUB_REF_NAME"

  verify-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: kit/hydra-ts/release-assets
      - name: Native macOS black-box and version verification
        working-directory: kit/hydra-ts
        run: |
          case "$(uname -m)" in
            arm64) binary=release-assets/hydra-cli-darwin-arm64 ;;
            x86_64) binary=release-assets/hydra-cli-darwin-x64 ;;
            *) echo "unsupported macOS runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          chmod +x "$binary"
          node --experimental-strip-types scripts/blackbox-compiled.ts "$binary"
          reported="$(env -u BUN_BE_BUN "$binary" version --json | jq -r .version)"
          test "v$reported" = "$GITHUB_REF_NAME"

  verify-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: kit/hydra-ts/release-assets
      - name: Native Windows black-box and version verification
        working-directory: kit/hydra-ts
        shell: pwsh
        run: |
          node --experimental-strip-types scripts/blackbox-compiled.ts release-assets/hydra-cli-windows-x64.exe
          $versionInfo = & ./release-assets/hydra-cli-windows-x64.exe version --json | ConvertFrom-Json
          $reported = $versionInfo.version
          if ("v$reported" -ne $env:GITHUB_REF_NAME) {
            throw "binary self-reports $reported, tag is $env:GITHUB_REF_NAME"
          }

  release:
    needs: [verify-linux, verify-macos, verify-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "hydra-swarm $GITHUB_REF_NAME" \
            --notes "Compiled harness binaries (Bun 1.3.14). Verify with the per-target manifest sha256, or install via kit/hydra/scripts/fetch-bin.sh which re-verifies checksum and self-reported version. See CHANGELOG.md." \
            release-assets/*
